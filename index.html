<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>D1FITNESS · Inteligência de Produto</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --or:#FF5C00;--or-glow:rgba(255,92,0,0.1);--or-b:rgba(255,92,0,0.35);
  --bg:#070709;--sf:#0D0D10;--card:#141418;--card-h:#1A1A1F;
  --bd:rgba(255,255,255,0.07);--tx:#F0F0F7;--mt:#5A5A65;--mt2:#2C2C35;
}
html,body{background:var(--bg);min-height:100vh;}
body{font-family:'Figtree',-apple-system,sans-serif;color:var(--tx);position:relative;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-25%;left:-15%;width:55%;height:55%;background:radial-gradient(ellipse,rgba(255,92,0,0.055) 0%,transparent 68%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-20%;right:-10%;width:45%;height:45%;background:radial-gradient(ellipse,rgba(255,92,0,0.03) 0%,transparent 68%);pointer-events:none;z-index:0;}
#app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 20px;position:relative;z-index:1;}
.wrap{width:100%;max-width:460px;transition:opacity .22s ease,transform .22s cubic-bezier(0.4,0,0.2,1);}
.wrap.out{opacity:0;transform:translateY(14px);}
.logo-w{margin-bottom:40px;}
.logo-img{height:38px;width:auto;display:block;}
@media(min-width:500px){.logo-img{height:32px;}}
.logo-sub{font-size:11px;color:var(--mt);font-weight:500;letter-spacing:0.5px;text-transform:uppercase;margin-top:7px;}
.hero-tag{display:inline-flex;align-items:center;gap:7px;background:rgba(255,92,0,0.1);border:1px solid rgba(255,92,0,0.25);border-radius:100px;padding:6px 14px;margin-bottom:22px;font-size:11px;font-weight:700;color:var(--or);letter-spacing:0.5px;text-transform:uppercase;}
.dot{width:6px;height:6px;background:var(--or);border-radius:50%;animation:blink 1.5s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.hero-h{font-size:34px;font-weight:900;letter-spacing:-1.5px;line-height:1.1;margin-bottom:16px;}
@media(min-width:500px){.hero-h{font-size:38px;}}
.hero-p{font-size:15px;color:var(--mt);line-height:1.65;margin-bottom:24px;}
.kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:22px;}
.kpi{background:var(--card);border:1.5px solid var(--bd);border-radius:16px;padding:14px 10px;text-align:center;}
.kpi-n{font-size:20px;font-weight:900;color:var(--or);}
.kpi-l{font-size:10px;color:var(--mt);margin-top:4px;font-weight:500;line-height:1.3;}
.flow{background:var(--card);border:1.5px solid var(--bd);border-radius:18px;padding:20px;margin-bottom:26px;}
.flow-t{font-size:11px;font-weight:700;color:var(--or);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:16px;}
.info-block{display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1.5px solid var(--bd);border-radius:18px;padding:18px;margin-bottom:12px;}
.info-ico{font-size:22px;min-width:32px;text-align:center;margin-top:2px;}
.info-title{font-size:12px;font-weight:800;color:var(--tx);letter-spacing:0.2px;text-transform:uppercase;margin-bottom:6px;}
.info-text{font-size:13px;color:var(--mt);line-height:1.6;}
.flow-s{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;}
.flow-s:last-child{margin-bottom:0;}
.flow-n{width:28px;height:28px;min-width:28px;background:rgba(255,92,0,0.1);border:1px solid rgba(255,92,0,0.25);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--or);}
.flow-tx{font-size:13px;line-height:1.5;padding-top:4px;}
.fw{font-weight:700;color:var(--tx);}.fm{color:var(--mt);}
.big-h{font-size:36px;font-weight:900;line-height:1.05;letter-spacing:-1.8px;margin-bottom:12px;}
@media(min-width:500px){.big-h{font-size:42px;}}
.oa{color:var(--or);}
.sub{font-size:15px;color:var(--mt);line-height:1.55;margin-bottom:34px;}
.meta{font-size:12px;color:var(--mt2);font-weight:500;letter-spacing:0.3px;text-transform:uppercase;margin-bottom:20px;}
.q-h{font-size:28px;font-weight:900;letter-spacing:-1.2px;line-height:1.1;margin-bottom:8px;}
@media(min-width:500px){.q-h{font-size:32px;}}
.q-sub{font-size:14px;color:var(--mt);margin-bottom:24px;line-height:1.5;}
.btn{width:100%;padding:19px 24px;background:var(--or);color:#fff;border:none;border-radius:18px;font-family:'Figtree',sans-serif;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:-0.3px;transition:background .18s,transform .15s;display:block;text-align:center;}
.btn:hover{background:#FF6B1A;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:0.35;cursor:default;transform:none;}
.btn-gh{width:100%;padding:17px 24px;background:transparent;color:var(--mt);border:1.5px solid var(--bd);border-radius:18px;font-family:'Figtree',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:border-color .18s,color .18s;display:block;margin-top:10px;text-align:center;}
.btn-gh:hover{border-color:rgba(255,255,255,0.18);color:var(--tx);}
.btn-bk{background:none;border:none;color:var(--mt);font-family:'Figtree',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;margin-bottom:30px;padding:0;}
.btn-bk:hover{color:var(--tx);}
.lbl{font-size:11px;font-weight:700;color:var(--or);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:12px;display:block;}
.name-in{width:100%;background:var(--card);border:1.5px solid var(--bd);border-radius:18px;padding:22px 24px;font-family:'Figtree',sans-serif;font-size:22px;font-weight:700;color:var(--tx);outline:none;transition:border-color .18s;margin-bottom:16px;}
.name-in::placeholder{color:var(--mt2);font-weight:400;font-size:18px;}
.name-in:focus{border-color:var(--or-b);}
.tip{background:rgba(255,92,0,0.06);border:1px solid rgba(255,92,0,0.18);border-radius:14px;padding:14px 18px;margin-top:14px;font-size:12px;color:var(--mt);line-height:1.5;}
.tip code{color:var(--or);font-weight:600;font-family:monospace;}
.prog{display:flex;gap:5px;margin-bottom:32px;}
.pd{height:3px;border-radius:2px;flex:1;background:var(--mt2);transition:background .3s;}
.pd.on{background:var(--or);}.pd.dn{background:rgba(255,92,0,0.35);}
.type-c{background:var(--card);border:1.5px solid var(--bd);border-radius:16px;padding:15px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:13px;margin-bottom:9px;-webkit-user-select:none;user-select:none;}
.type-c:hover{border-color:var(--or-b);background:var(--card-h);transform:translateX(3px);}
.type-c.sel{border-color:var(--or);background:var(--or-glow);transform:translateX(3px);}
.type-ic{width:40px;height:40px;min-width:40px;background:var(--sf);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;transition:background .18s;}
.type-c.sel .type-ic{background:rgba(255,92,0,0.15);}
.t-lb{font-size:14px;font-weight:700;letter-spacing:-0.3px;}.t-sb{font-size:12px;color:var(--mt);margin-top:2px;line-height:1.4;}
.f-lb{font-size:11px;font-weight:700;color:var(--or);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:10px;}
.f-in{width:100%;background:var(--card);border:1.5px solid var(--bd);border-radius:14px;padding:16px 18px;font-family:'Figtree',sans-serif;font-size:16px;color:var(--tx);outline:none;resize:none;transition:border-color .18s;}
.f-in::placeholder{color:var(--mt2);}
.f-in:focus{border-color:var(--or-b);}

/* VOICE */
.voice-zone{margin-top:12px;margin-bottom:8px;}
.mic-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--or-glow);border:1.5px solid var(--or-b);border-radius:14px;padding:14px 20px;cursor:pointer;font-family:'Figtree',sans-serif;font-size:14px;font-weight:700;color:var(--or);transition:all .2s;}
.mic-btn:hover{background:rgba(255,92,0,0.16);}
.mic-btn:active{transform:scale(0.98);}
.mic-btn:disabled{opacity:0.35;cursor:not-allowed;}
.mic-btn.rec{background:rgba(220,38,38,0.1);border-color:rgba(239,68,68,0.45);color:#ef4444;animation:ring-pulse 1.2s ease infinite;}
@keyframes ring-pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.25);}60%{box-shadow:0 0 0 10px rgba(239,68,68,0);}}
.mic-svg{display:block;flex-shrink:0;transition:transform .15s;}
.mic-btn.rec .mic-svg{animation:mic-bounce .6s ease infinite alternate;display:none;}
@keyframes mic-bounce{from{transform:scale(1);}to{transform:scale(1.15);}}
.wavebars{display:none;align-items:center;gap:3px;height:20px;}
.mic-btn.rec .wavebars{display:flex;}
.wbar{width:3px;background:currentColor;border-radius:2px;animation:wave .7s ease infinite;}
.wbar:nth-child(1){animation-delay:0s;height:8px;}.wbar:nth-child(2){animation-delay:.1s;height:14px;}.wbar:nth-child(3){animation-delay:.2s;height:20px;}.wbar:nth-child(4){animation-delay:.3s;height:14px;}.wbar:nth-child(5){animation-delay:.4s;height:8px;}
@keyframes wave{0%,100%{transform:scaleY(0.5);}50%{transform:scaleY(1.2);}}
.mic-hint{font-size:11px;color:var(--mt2);text-align:center;margin-top:7px;}
.rec-hint{color:var(--or);font-weight:600;display:none;}
.interim-bar{display:none;background:rgba(255,92,0,0.06);border:1px solid rgba(255,92,0,0.2);border-radius:12px;padding:10px 14px;margin-top:8px;font-size:13px;color:var(--mt);font-style:italic;line-height:1.5;}
.interim-bar.show{display:block;}
.voice-na{font-size:12px;color:var(--mt2);text-align:center;padding:10px;background:var(--card);border-radius:12px;border:1px solid var(--bd);}

.stepper{background:var(--card);border:1.5px solid var(--bd);border-radius:22px;padding:10px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.s-btn{width:56px;height:56px;background:var(--sf);border:none;border-radius:15px;cursor:pointer;font-size:24px;color:var(--tx);transition:all .15s;display:flex;align-items:center;justify-content:center;}
.s-btn:hover{background:rgba(255,92,0,0.1);color:var(--or);}
.s-btn:active{transform:scale(0.93);}
.s-val{font-size:44px;font-weight:900;letter-spacing:-2px;}
.s-lb{font-size:13px;color:var(--mt);text-align:center;margin-bottom:22px;}
.upl{border:2px dashed var(--bd);border-radius:18px;padding:40px 24px;text-align:center;cursor:pointer;transition:all .18s;margin-bottom:12px;}
.upl:hover{border-color:var(--or-b);background:rgba(255,92,0,0.02);}
.upl-ico{font-size:32px;margin-bottom:10px;}.upl-tx{font-size:14px;color:var(--mt);font-weight:500;}.upl-ht{font-size:12px;color:var(--mt2);margin-top:5px;}
.img-pv{width:100%;height:180px;object-fit:cover;border-radius:14px;margin-bottom:10px;display:block;}
.img-rm{background:rgba(255,69,58,0.08);border:1.5px solid rgba(255,69,58,0.2);color:#FF453A;border-radius:10px;padding:9px 16px;font-family:'Figtree',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:12px;display:inline-block;}
.chip{background:var(--card);border:1.5px solid var(--bd);border-radius:15px;padding:14px 16px;margin-bottom:9px;display:flex;align-items:flex-start;gap:12px;}
.chip-ic{width:36px;height:36px;min-width:36px;background:var(--or-glow);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.ch-nm{font-size:14px;font-weight:700;letter-spacing:-0.3px;}.ch-tp{font-size:12px;color:var(--mt);margin-top:2px;}.ch-ds{font-size:11px;color:var(--mt2);margin-top:4px;line-height:1.4;}.ch-fr{margin-left:auto;font-size:14px;font-weight:800;color:var(--or);white-space:nowrap;padding-left:10px;}
@keyframes pop{0%{transform:scale(0.4);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.ok-ico{width:88px;height:88px;background:var(--or-glow);border:2px solid rgba(255,92,0,0.25);border-radius:28px;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 28px;animation:pop .5s cubic-bezier(0.4,0,0.2,1) both;}
.stat-box{background:var(--card);border:1.5px solid var(--bd);border-radius:18px;padding:22px;margin-bottom:24px;text-align:center;}
.stat-n{font-size:50px;font-weight:900;letter-spacing:-3px;color:var(--or);line-height:1;}.stat-l{font-size:13px;color:var(--mt);margin-top:5px;}
.sp{height:12px;}
</style>
</head>

const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const HAS_VOICE = !IS_IOS && !!(window.SpeechRecognition||window.webkitSpeechRecognition);
const MIC_ICON = `<svg class="mic-svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2H3v2a9 9 0 0 0 8 8.94V23h2v-2.06A9 9 0 0 0 21 12v-2z"/></svg>`;
const WAVES = `<div class="wavebars"><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div></div>`;

let st={phase:'loading',vendor:null,nameInput:'',entries:[],cur:{type:null,product:'',description:'',frequency:1,imgData:null},formStep:0};
let voiceActive=false,voiceField=null,voiceBase='',recog=null;

// Event delegation for mic buttons — works on iOS Safari
document.addEventListener('click', function(e){
  const btn = e.target.closest('[data-fid]');
  if(btn){ e.preventDefault(); startVoice(btn.dataset.fid, btn.dataset.lbl); }
}, true);

// ── Voice ──
function micBtn(fid,lbl){
  if(IS_IOS) return `<div class="voice-na" style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;">
    <span style="font-size:22px;flex-shrink:0;margin-top:1px;">🎤</span>
    <div>
      <div style="font-size:13px;font-weight:600;color:var(--tx);">Use o microfone do teclado</div>
      <div style="font-size:12px;color:var(--mt2);margin-top:3px;line-height:1.5;">Toque no campo acima → aguarde o teclado aparecer → toque no ícone 🎤 no teclado do iPhone para falar</div>
    </div>
  </div>`;
  if(!HAS_VOICE) return `<div class="voice-na">🎙️ Voz disponível no Chrome (Android) e Safari (Mac)</div>`;
  return `<div class="voice-zone">
    <button class="mic-btn" id="mb_${fid}" data-fid="${fid}" data-lbl="${lbl}">
      ${MIC_ICON}${WAVES}<span id="mt_${fid}">${lbl}</span>
    </button>
    <div class="mic-hint">Toque para ativar · toque novamente para pausar</div>
    <div class="mic-hint rec-hint" id="rh_${fid}" style="display:none">🔴 Ouvindo... fale agora</div>
    <div class="interim-bar" id="ib_${fid}"></div>
  </div>`;
}

function startVoice(fid,lbl){
  if(!HAS_VOICE)return;
  const btn=document.getElementById('mb_'+fid);
  const field=document.getElementById(fid);
  if(!btn||!field)return;
  if(voiceActive&&voiceField===fid){if(recog)recog.stop();return;}
  if(voiceActive&&recog)recog.stop();
  voiceField=fid; voiceBase=field.value;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR(); recog.lang='pt-BR'; recog.continuous=true; recog.interimResults=true; recog.maxAlternatives=1;
  recog.onstart=()=>{voiceActive=true;setMicUI(fid,'rec');};
  recog.onresult=(ev)=>{
    let interim='',final='';
    for(let i=ev.resultIndex;i<ev.results.length;i++){
      if(ev.results[i].isFinal)final+=ev.results[i][0].transcript;
      else interim+=ev.results[i][0].transcript;
    }
    const sep=voiceBase&&voiceBase.trim()&&!voiceBase.endsWith(' ')?' ':'';
    const ib=document.getElementById('ib_'+fid);
    if(interim){field.value=voiceBase+sep+interim;if(ib){ib.textContent='"'+interim+'"';ib.classList.add('show');}}
    if(final){
      const full=voiceBase+sep+final; field.value=full; voiceBase=full;
      if(ib)ib.classList.remove('show');
      if(fid==='prodInp')st.cur.product=full;
      if(fid==='descInp')st.cur.description=full;
      const nb=document.getElementById('nextBtn');if(nb)nb.disabled=!full.trim();
    }
  };
  recog.onerror=(ev)=>{voiceActive=false;setMicUI(fid,'idle');if(ev.error==='not-allowed')alert('🎙️ Microfone bloqueado!\n\nPermita o acesso:\n• iPhone: Ajustes → Safari → Microfone → Permitir\n• Android: toque no cadeado na barra de endereço');};
  recog.onend=()=>{voiceActive=false;setMicUI(fid,'idle');const ib=document.getElementById('ib_'+fid);if(ib)ib.classList.remove('show');};
  try{recog.start();}catch(e){voiceActive=false;setMicUI(fid,'idle');}
}

function setMicUI(fid,s){
  const btn=document.getElementById('mb_'+fid),txt=document.getElementById('mt_'+fid),rh=document.getElementById('rh_'+fid);
  if(!btn)return;
  if(s==='rec'){btn.classList.add('rec');if(txt)txt.textContent='Pausar';if(rh)rh.style.display='block';}
  else{btn.classList.remove('rec');if(txt)txt.textContent=fid==='prodInp'?'Falar produto':'Falar descrição';if(rh)rh.style.display='none';}
}

// ── Render ──
const wrap=document.getElementById('wrap');
function go(p){wrap.classList.add('out');setTimeout(()=>{st.phase=p;render();wrap.classList.remove('out');},220);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function logo(sub){return `<div class="logo-w"><img src="${LOGO}" alt="D1FITNESS" class="logo-img">${sub?`<div class="logo-sub">${sub}</div>`:''}</div>`;}
function prog(){return `<div class="prog">${[0,1,2,3,4].map(i=>`<div class="pd ${i===st.formStep?'on':i<st.formStep?'dn':''}"></div>`).join('')}</div>`;}

function render(){
  const v=st.vendor||st.nameInput.trim(),fn=v?v.split(' ')[0]:'';
  const td=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  const tdC=td.charAt(0).toUpperCase()+td.slice(1);

  if(st.phase==='splash'){wrap.innerHTML=`${logo('Sistema de Inteligência de Produto')}
    <div class="hero-tag"><div class="dot"></div>Uso interno · Vendas D1FITNESS</div>
    <h1 class="hero-h">A voz do cliente<br>vira <span class="oa">decisão.</span></h1>

    <div class="info-block">
      <div class="info-ico">🎯</div>
      <div>
        <div class="info-title">O que estamos fazendo</div>
        <div class="info-text">Captando diariamente o que os clientes pedem, sentem e precisam — direto da boca do vendedor para o time de compras. Sem ruído, sem achismo.</div>
      </div>
    </div>

    <div class="info-block">
      <div class="info-ico">📋</div>
      <div>
        <div class="info-title">Como você deve preencher</div>
        <div class="info-text">Todo dia às <strong style="color:var(--tx)">17h30</strong> você recebe um link no e-mail. Abre, registra o que ouviu dos clientes naquele dia — por escrito ou por voz 🎙️ — e envia. Leva menos de 2 minutos.</div>
      </div>
    </div>

    <div class="info-block" style="border-color:rgba(255,92,0,0.25);background:rgba(255,92,0,0.06);">
      <div class="info-ico">📈</div>
      <div>
        <div class="info-title" style="color:var(--or)">Resultado esperado</div>
        <div class="info-text">Com consistência diária, o time de compras passa a saber <strong style="color:var(--tx)">o que os clientes realmente querem</strong> — antes de importar, antes de comprar, antes de desenvolver. Portfólio mais assertivo, menos ruptura, mais venda.</div>
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi"><div class="kpi-n">2min</div><div class="kpi-l">por preenchimento</div></div>
      <div class="kpi"><div class="kpi-n">17h30</div><div class="kpi-l">link no e-mail</div></div>
      <div class="kpi"><div class="kpi-n">diário</div><div class="kpi-l">= tendências reais</div></div>
    </div>

    <button class="btn" onclick="go(st.vendor?'welcome':'enter-name')">${st.vendor?`Começar — ${fn} →`:'Acessar agora →'}</button>
  `;}  

  else if(st.phase==='enter-name'){wrap.innerHTML=`${logo('Inteligência de Produto')}
    <h1 class="big-h">Qual é o<br><span class="oa">seu nome?</span></h1>
    <p class="sub">No dia a dia você receberá o link personalizado às 17h30. Por agora, confirme seu nome.</p>
    <label class="lbl">Seu nome</label>
    <input class="name-in" id="nameInp" placeholder="Ex: Marcos" value="${esc(st.nameInput)}" autocomplete="given-name"/>
    <button class="btn" id="nameBtn" onclick="confirmName()" ${!st.nameInput.trim()?'disabled':''}>Continuar →</button>
    <div class="tip">💡 No dia a dia o link chegará personalizado: <code>?vendedor=Marcos</code></div>`;
    const inp=document.getElementById('nameInp');
    if(inp){inp.focus();inp.addEventListener('input',e=>{st.nameInput=e.target.value;document.getElementById('nameBtn').disabled=!e.target.value.trim();});inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&st.nameInput.trim())confirmName();});}
  }

  else if(st.phase==='welcome'){wrap.innerHTML=`${logo('Inteligência de Produto')}
    <div class="meta">${tdC}</div>
    <h1 class="big-h">Olá,<br><span class="oa">${fn}.</span></h1>
    <p class="sub">Registre o que você ouviu dos clientes hoje. Escreva ou use o <strong style="color:var(--tx)">comando de voz</strong> 🎙️ para ir mais rápido.</p>
    <button class="btn" onclick="startForm()">Começar registro →</button>
    ${st.entries.length?`<button class="btn-gh" onclick="go('review')">Ver ${st.entries.length} ${st.entries.length===1?'registro':'registros'} →</button>`:''}`;
  }

  else if(st.phase==='choice'){
    wrap.innerHTML=`${logo('Registro do dia')}
    <h2 class="q-h">Hoje teve<br><span class="oa">demanda</span><br>de produto?</h2>
    <p class="q-sub" style="margin-bottom:28px;">Algum cliente pediu produto, tirou dúvida ou sugeriu algo que não temos no portfólio?</p>
    <button class="btn" onclick="startForm()">Sim, vou registrar →</button>
    <div style="height:12px"></div>
    <button class="btn" style="background:transparent;color:var(--mt2);border:1.5px solid var(--bd);margin-top:4px;" onclick="semDemandaHoje()">Não tive demandas hoje</button>
    `;}
  else if(st.phase==='form'){
    const s=st.formStep,c=st.cur;let content='';
    if(s===0){content=`<h2 class="q-h">Que tipo de<br><span class="oa">demanda</span> foi?</h2><p class="q-sub">Selecione a categoria que melhor descreve o que o cliente trouxe.</p>${DT.map(t=>`<div class="type-c ${c.type===t.id?'sel':''}" onclick="selType('${t.id}')"><div class="type-ic">${t.ico}</div><div><div class="t-lb">${t.lbl}</div><div class="t-sb">${t.sub}</div></div></div>`).join('')}`;}
    else if(s===1){content=`<h2 class="q-h">Qual <span class="oa">produto</span><br>foi citado?</h2><p class="q-sub">Escreva ou <strong style="color:var(--or)">fale 🎙️</strong> o nome do produto ou categoria mencionado pelo cliente.</p><div class="f-lb">Produto ou categoria</div><input class="f-in" id="prodInp" placeholder="ex: Air Bike D1, Esteira DC D1, Remo D1, Bike D1..." value="${esc(c.product)}"/>${micBtn('prodInp','Falar produto')}`;}
    else if(s===2){content=`<h2 class="q-h">O que o<br><span class="oa">cliente</span> disse?</h2><p class="q-sub">Fale ou escreva com as palavras dele — quanto mais fiel, melhor o insight para compras.</p><div class="f-lb">Descrição</div><textarea class="f-in" id="descInp" rows="4" placeholder='"Não tem o guidão regulável na Air Bike D1, o cliente pediu isso..."'>${esc(c.description)}</textarea>${micBtn('descInp','Falar descrição')}`;}
    else if(s===3){content=`<h2 class="q-h">Quantos<br><span class="oa">clientes</span> pediram?</h2><p class="q-sub">Cada voto aqui vira prioridade real para o time de compras.</p><div class="stepper"><button class="s-btn" onclick="chFreq(-1)">−</button><span class="s-val">${c.frequency}</span><button class="s-btn" onclick="chFreq(1)">+</button></div><p class="s-lb">${c.frequency===1?'1 cliente trouxe':`${c.frequency} clientes trouxeram`} isso hoje</p>`;}
    else if(s===4){content=`<h2 class="q-h">Tem alguma<br><span class="oa">foto</span>?</h2><p class="q-sub">Opcional — referência do cliente, print ou foto do produto.</p>${c.imgData?`<img src="${c.imgData}" class="img-pv"/><button class="img-rm" onclick="rmImg()">Remover foto</button>`:`<div class="upl" onclick="document.getElementById('fileInp').click()"><div class="upl-ico">📷</div><div class="upl-tx">Toque para adicionar foto</div><div class="upl-ht">JPG, PNG ou HEIC</div></div><input type="file" id="fileInp" accept="image/*" style="display:none" onchange="handleImg(this)"/>`}`;}
    const ok=(s===0&&c.type)||(s===1&&c.product.trim())||(s===2&&c.description.trim())||(s>=3);
    wrap.innerHTML=`<button class="btn-bk" onclick="prevStep()">← Voltar</button>${prog()}${content}<div class="sp"></div><button class="btn" id="nextBtn" onclick="nextStep()" ${!ok?'disabled':''}>${s===4?'Salvar registro ✓':'Continuar →'}</button>${s===4?`<button class="btn-gh" onclick="skipPhoto()">Pular foto</button>`:''}`;
    const pi=document.getElementById('prodInp');if(pi){pi.focus();pi.addEventListener('input',e=>{st.cur.product=e.target.value;const nb=document.getElementById('nextBtn');if(nb)nb.disabled=!e.target.value.trim();});}
    const di=document.getElementById('descInp');if(di){di.focus();di.addEventListener('input',e=>{st.cur.description=e.target.value;const nb=document.getElementById('nextBtn');if(nb)nb.disabled=!e.target.value.trim();});}
  }

  else if(st.phase==='add-more'){wrap.innerHTML=`${logo('Registro salvo ✓')}
    <h1 class="big-h">Mais<br><span class="oa">alguma coisa?</span></h1>
    <p class="sub">${st.entries.length===1?'1 registro salvo.':st.entries.length+' registros salvos.'} Adicione mais ou finalize o dia.</p>
    <button class="btn" onclick="addMore()">+ Adicionar outro</button>
    <button class="btn-gh" onclick="go('review')">Revisar e enviar →</button>`;}

  else if(st.phase==='review'){
    const chips=st.entries.map((e,i)=>{const t=DT.find(d=>d.id===e.type);const ds=e.description.length>70?e.description.slice(0,70)+'…':e.description;return `<div class="chip"><div class="chip-ic">${t?t.ico:''}</div><div style="flex:1;min-width:0"><div class="ch-nm">${esc(e.product)}</div><div class="ch-tp">${t?t.lbl:''}</div><div class="ch-ds">${esc(ds)}</div></div><div class="ch-fr">${e.frequency}×</div></div>`;}).join('');
    wrap.innerHTML=`<button class="btn-bk" onclick="go('add-more')">← Voltar</button>
    <h1 class="big-h">Revise e<br><span class="oa">confirme.</span></h1>
    <p class="q-sub" style="margin-bottom:22px">${fn} · ${tdC}</p>${chips}<div class="sp"></div>
    <button class="btn" onclick="submitData()">Enviar tudo ✓</button>`;}

  else if(st.phase==='submitting'){wrap.innerHTML=`${logo()}<div style="text-align:center;padding:60px 0"><div style="font-size:38px;margin-bottom:22px">⏳</div><h2 style="font-size:22px;font-weight:800;margin-bottom:8px">Enviando...</h2><p style="color:var(--mt);font-size:14px">Salvando na planilha e notificando a liderança.</p></div>`;}

  else if(st.phase==='done'){
    const isDia=st.entries.length===1&&st.entries[0].type==='sem_demanda';
    wrap.innerHTML=`<div style="text-align:center"><div style="height:36px"></div><div class="ok-ico">✓</div>
    <h1 class="big-h" style="text-align:center"><span class="oa">${isDia?'Registrado!':'Enviado!'}</span></h1>
    <p class="sub" style="text-align:center">Valeu, ${fn}! ${isDia?'Dia registrado — até amanhã.':'Seus registros estão na planilha e a liderança foi notificada.'}</p>
    ${isDia?'<div class="stat-box"><div class="stat-n" style="font-size:32px">📋</div><div class="stat-l">Dia registrado sem demandas</div></div>':'<div class="stat-box"><div class="stat-n">'+st.entries.length+'</div><div class="stat-l">'+(st.entries.length===1?'demanda registrada hoje':'demandas registradas hoje')+'</div></div>'}
    <p style="font-size:13px;color:var(--mt)">${isDia?'Continue amanhã — consistência é o que gera inteligência.':'A análise chega amanhã cedo no e-mail da liderança.'}</p></div>`;}

  else if(st.phase==='error'){wrap.innerHTML=`${logo()}<div style="text-align:center;padding:40px 0"><div style="font-size:38px;margin-bottom:20px">⚠️</div><h2 style="font-size:22px;font-weight:800;margin-bottom:8px">Erro no envio</h2><p style="color:var(--mt);font-size:14px;margin-bottom:26px">Verifique sua conexão e tente novamente.</p><button class="btn" onclick="go('review')">← Tentar de novo</button></div>`;}
}

// ── Actions ──
function confirmName(){if(st.nameInput.trim())go('welcome');}
function startForm(){st.cur={type:null,product:'',description:'',frequency:1,imgData:null};st.formStep=0;go('form');}
function semDemandaHoje(){st.entries=[{type:'sem_demanda',product:'Sem demandas hoje',description:'Dia registrado sem demandas de produto.',frequency:0}];go('submitting');submitData();}
function addMore(){st.cur={type:null,product:'',description:'',frequency:1,imgData:null};st.formStep=0;go('form');}
function selType(id){st.cur.type=id;document.querySelectorAll('.type-c').forEach(c=>{const a=c.getAttribute('onclick');c.classList.toggle('sel',a&&a.includes("'"+id+"'"));});const nb=document.getElementById('nextBtn');if(nb)nb.disabled=false;}
function chFreq(d){st.cur.frequency=Math.max(1,st.cur.frequency+d);render();}
function rmImg(){st.cur.imgData=null;render();}
function skipPhoto(){saveEntry();}
function handleImg(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{st.cur.imgData=e.target.result;render();};r.readAsDataURL(f);}
function prevStep(){if(voiceActive&&recog)recog.stop();if(st.formStep>0){st.formStep--;render();}else go('welcome');}
function nextStep(){if(voiceActive&&recog)recog.stop();const s=st.formStep;if(s===1){const i=document.getElementById('prodInp');if(i)st.cur.product=i.value;}if(s===2){const i=document.getElementById('descInp');if(i)st.cur.description=i.value;}if(s<4){st.formStep++;render();}else saveEntry();}
function saveEntry(){st.entries.push({...st.cur});st.cur={type:null,product:'',description:'',frequency:1,imgData:null};go('add-more');}

async function submitData(){
  go('submitting');
  const v=st.vendor||st.nameInput.trim();
  const today=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
  const hora=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const registros=st.entries.map((e,i)=>{const t=DT.find(d=>d.id===e.type);return `[${i+1}] ${t?t.lbl:e.type} — ${e.product}\n    Clientes: ${e.frequency}\n    "${e.description}"`;}).join('\n\n');
  const payload={vendedor:v,data:today,hora,total_registros:st.entries.length,registros};

  try{
    // Usa text/plain para evitar CORS preflight
    await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
    go('done');
  }catch(e){ go('error'); }
}

(function(){
  try{const n=new URLSearchParams(window.location.search).get('vendedor');if(n)st.vendor=decodeURIComponent(n);}catch(e){}
  st.phase='splash';render();
})();
</script>
